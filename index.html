<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyStore | Líder en Recargas Gamer</title>
    <style>
        :root {
            --bg-main: #060913;       /* Fondo oscuro profundo de Wings Store */
            --bg-card: #0d1326;       /* Fondo de las tarjetas de producto */
            --bg-nav: #090e1d;        /* Barra de navegación superior */
            --primary-neon: #00f0ff;  /* Cian Neón característico */
            --accent-neon: #00ff66;   /* Verde de éxito para acciones principales */
            --text-white: #ffffff;
            --text-secondary: #94a3b8;
            --border-glow: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            -webkit-tap-highlight-color: transparent;
        }

        /* Navbar estilo Premium Wings */
        nav {
            background-color: var(--bg-nav);
            padding: 15px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-glow);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        nav .logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-white);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        nav .logo span {
            color: var(--primary-neon);
        }

        /* Menú de categorías minimalista y limpio */
        .menu-categorias {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px 20px;
            background-color: rgba(9, 14, 29, 0.8);
            border-bottom: 1px solid var(--border-glow);
        }

        .btn-categoria {
            background-color: #131b31;
            color: var(--text-secondary);
            border: 1px solid transparent;
            padding: 12px 30px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
        }

        .btn-categoria:hover {
            color: var(--text-white);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .btn-categoria.activo {
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--primary-neon);
            border-color: var(--primary-neon);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.25);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .seccion-contenido {
            display: none;
        }

        .seccion-contenido.activa {
            display: block !important;
        }

        h2 {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 22px;
            background-color: var(--primary-neon);
            border-radius: 4px;
        }

        /* Grid simétrica de productos */
        .grid-store {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        /* Tarjetas de Producto Estilo Wings */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 14px;
            padding: 16px;
            text-align: left;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-neon);
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.15);
        }

        .badge-popular {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(90deg, #ff0055, #ff5500);
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            white-space: nowrap;
            z-index: 2;
            box-shadow: 0 2px 10px rgba(255,0,85,0.3);
        }

        .img-container {
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 10px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .img-container img {
            max-height: 80%;
            max-width: 80%;
            object-fit: contain;
        }

        .card h3 {
            font-size: 1rem;
            margin: 4px 0 8px 0;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .price-box {
            margin-bottom: 10px;
        }

        .price-box .currency {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .price-box .amount {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-white);
        }

        .bonus-coins {
            display: inline-block;
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--primary-neon);
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 12px;
            align-self: flex-start;
        }

        /* Inputs limpios e integrados */
        .card-input {
            width: 100%;
            padding: 8px 12px;
            background-color: #060913;
            border: 1px solid var(--border-glow);
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.2s;
        }

        .card-input:focus {
            border-color: var(--primary-neon);
        }

        /* Botón de Recarga */
        .btn-action {
            background-color: rgba(0, 255, 102, 0.08);
            color: var(--accent-neon);
            border: 1px solid var(--accent-neon);
            padding: 10px;
            font-weight: 700;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            text-align: center;
            cursor: pointer;
            width: 100%;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-action:hover {
            background-color: var(--accent-neon);
            color: #060913;
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        /* Soporte Flotante Oficial */
        .btn-support {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25d366;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            box-shadow: 0 6px 16px rgba(0,0,0,0.6);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .btn-support:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
