<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyStore | Líder en Recargas Gamer</title>
    <style>
        :root {
            --bg-main: #060913;       
            --bg-card: #0d1326;       
            --bg-nav: #090e1d;        
            --primary-neon: #00f0ff;  
            --accent-neon: #00ff66;   
            --text-white: #ffffff;
            --text-secondary: #94a3b8;
            --border-glow: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-white);
            -webkit-tap-highlight-color: transparent;
        }

        nav {
            background-color: var(--bg-nav);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-glow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-white);
            text-decoration: none;
        }

        nav .logo span {
            color: var(--primary-neon);
        }

        .menu-categorias {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            background-color: rgba(9, 14, 29, 0.9);
            border-bottom: 1px solid var(--border-glow);
        }

        .btn-categoria {
            background-color: #131b31;
            color: var(--text-secondary);
            border: 1px solid transparent;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-categoria.activo {
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--primary-neon);
            border-color: var(--primary-neon);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 15px 100px 15px; /* Margen inferior para que el botón de soporte no tape contenido */
        }

        .seccion-contenido {
            display: none !important;
            width: 100%;
        }

        .seccion-contenido.activa {
            display: flex !important;
            flex-direction: column;
            width: 100%;
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background-color: var(--primary-neon);
            border-radius: 2px;
        }

        /* Contenedor flexible vertical continuo sin límites de altura */
        .flex-store {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        /* Tarjetas optimizadas para filas en móviles */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            padding: 14px;
            position: relative;
            display: block;
            width: 100%;
        }

        .badge-popular {
            position: absolute;
            top: -10px;
            left: 15px;
            background: linear-gradient(90deg, #ff0055, #ff5500);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .card-header-box {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
            margin-bottom: 12px;
        }

        .img-container {
            width: 65px;
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(0,0,0,0.3);
            border-radius: 8px;
            flex-shrink: 0;
        }

        .img-container img {
            max-height: 85%;
            max-width: 85%;
            object-fit: contain;
        }

        .info-box {
            flex-grow: 1;
        }

        .card h3 {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .bonus-coins {
            display: inline-block;
            background-color: rgba(0, 240, 255, 0.1);
            color: var(--primary-neon);
            font-size: 0.7rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .price-box {
            font-size: 1.25rem;
            font-weight: 800;
            color: #ffffff;
            text-align: right;
            min-width: 90px;
        }

        .price-box span {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
            margin-right: 2px;
        }

        .card-input {
            width: 100%;
            padding: 10px;
            background-color: #060913;
            border: 1px solid var(--border-glow);
            border-radius: 6px;
            color: white;
            font-size: 0.85rem;
            margin-bottom: 10px;
            outline: none;
        }

        .card-input:focus {
            border-color: var(--primary-neon);
        }

        .btn-action {
            background-color: rgba(0, 255, 102, 0.08);
            color: var(--accent-neon);
            border: 1px solid var(--accent-neon);
            padding: 10px;
            font-weight: 700;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
            cursor: pointer;
            width: 100%;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-action:hover {
            background-color: var(--accent-neon);
            color: #060913;
        }

        .btn-support {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25d366;
            color: white;
            padding: 12px 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
