<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BunnyStore | Recargas Gamer</title>
    <style>
        :root {
            --bg-body: #000000;
            --bg-card: #0b0f17;
            --bg-nav: #05070a;
            --neon-color: #00ff66;
            --text-main: #ffffff;
            --text-muted: #64748b;
            --border-card: #141b26;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        nav {
            background-color: var(--bg-nav);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-card);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-main);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        nav .logo span {
            color: var(--neon-color);
        }

        .menu-categorias {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px 20px;
            background-color: rgba(11, 15, 23, 0.6);
            overflow-x: auto;
            white-space: nowrap;
            border-bottom: 1px solid var(--border-card);
        }

        .menu-categorias::-webkit-scrollbar {
            display: none;
        }

        .btn-categoria {
            background-color: #111622;
            color: var(--text-main);
            border: 1px solid transparent;
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .btn-categoria.activo {
            background-color: rgba(0, 255, 102, 0.1);
            color: var(--neon-color);
            border-color: var(--neon-color);
            box-shadow: 0 0 12px rgba(0, 255, 102, 0.25);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .seccion-contenido {
            display: none;
        }

        .seccion-contenido.activa {
            display: block;
        }

        h2 {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background-color: var(--neon-color);
            border-radius: 2px;
        }

        .grid-store {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 18px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
